<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamified Quiz App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

.quiz-container{
  width:450px;
  background:#1f2a38;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
  position:relative;
}

h2{ margin-bottom:10px; }

.progress-bar{
  height:8px;
  background:#333;
  border-radius:5px;
  margin-bottom:15px;
}
.progress{
  height:8px;
  width:0%;
  background:#00f2fe;
  border-radius:5px;
  transition:0.4s;
}

.timer{
  font-size:14px;
  margin-bottom:10px;
}

.option{
  display:block;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  background:#2e3d52;
  cursor:pointer;
  transition:0.3s;
}
.option:hover{
  background:#00c6ff;
  transform:scale(1.05);
}

.correct{ background:#2ecc71 !important; }
.wrong{ background:#e74c3c !important; }

button{
  margin-top:12px;
  padding:8px 15px;
  border:none;
  background:#00c6ff;
  color:black;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

select{
  margin-bottom:10px;
  padding:5px;
  border-radius:5px;
}

.score, .highscore{
  margin-top:10px;
  font-weight:bold;
}

/* Confetti */
.confetti{
  position:absolute;
  width:8px;
  height:8px;
  top:0;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  to{
    transform:translateY(500px) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question">Select Difficulty</h2>

  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <div class="timer">Time Left: <span id="time">15</span>s</div>

  <div class="progress-bar"><div class="progress" id="progress"></div></div>

  <div id="options"></div>

  <button id="nextBtn">Start</button>

  <div class="score" id="score">Points: 0</div>
  <div class="highscore" id="highscore"></div>
</div>

<script>
const quizLevels = {

easy:[
 {question:"HTML stands for?",
  options:["Hyper Text Markup Language","High Text Machine Language","Home Tool Markup Language"],
  answer:"Hyper Text Markup Language"},

 {question:"CSS is used for?",
  options:["Structure","Styling","Database"],
  answer:"Styling"},

 {question:"Which tag creates paragraph?",
  options:["<p>","<para>","<text>"],
  answer:"<p>"},

 {question:"Which attribute is used for image source?",
  options:["src","href","link"],
  answer:"src"}
],

medium:[
 {question:"JavaScript is a ___ language?",
  options:["Programming","Styling","Database"],
  answer:"Programming"},

 {question:"Which is frontend framework?",
  options:["React","Node","MongoDB"],
  answer:"React"},

 {question:"Which method adds element at end of array?",
  options:["push()","pop()","shift()"],
  answer:"push()"},

 {question:"Which symbol is strict equality?",
  options:["==","===","="],
  answer:"==="}
],

hard:[
 {question:"Which method converts JSON to object?",
  options:["JSON.parse()","JSON.stringify()","JSON.convert()"],
  answer:"JSON.parse()"},

 {question:"Which keyword declares block scope variable?",
  options:["var","let","define"],
  answer:"let"},

 {question:"What does DOM stand for?",
  options:["Document Object Model","Data Object Management","Digital Ordinance Model"],
  answer:"Document Object Model"},

 {question:"Which HTTP status code means Not Found?",
  options:["200","404","500"],
  answer:"404"}
]

};

let quizData=[];
let currentQuestion=0;
let points=0;
let timer;
let timeLeft=15;

const questionEl=document.getElementById("question");
const optionsEl=document.getElementById("options");
const nextBtn=document.getElementById("nextBtn");
const scoreEl=document.getElementById("score");
const highscoreEl=document.getElementById("highscore");
const progressEl=document.getElementById("progress");
const difficultyEl=document.getElementById("difficulty");
const timeEl=document.getElementById("time");

highscoreEl.textContent="High Score: "+(localStorage.getItem("highscore")||0);

nextBtn.addEventListener("click",()=>{
 if(nextBtn.textContent==="Start"){
   startQuiz();
 } else {
   currentQuestion++;
   if(currentQuestion<quizData.length){
     loadQuestion();
   } else {
     showResult();
   }
 }
});

function startQuiz(){
 quizData=quizLevels[difficultyEl.value];
 currentQuestion=0;
 points=0;
 scoreEl.textContent="Points: 0";
 difficultyEl.style.display="none";
 nextBtn.textContent="Next";
 loadQuestion();
}

function loadQuestion(){
 clearInterval(timer);
 timeLeft=15;
 timeEl.textContent=timeLeft;

 timer=setInterval(()=>{
   timeLeft--;
   timeEl.textContent=timeLeft;
   if(timeLeft<=0){
     clearInterval(timer);
     nextBtn.click();
   }
 },1000);

 const current=quizData[currentQuestion];
 questionEl.textContent=current.question;
 optionsEl.innerHTML="";
 progressEl.style.width=(currentQuestion/quizData.length)*100+"%";

 current.options.forEach(option=>{
   const div=document.createElement("div");
   div.textContent=option;
   div.classList.add("option");
   div.addEventListener("click",()=>selectAnswer(div,current.answer));
   optionsEl.appendChild(div);
 });
}

function selectAnswer(selected,correctAnswer){
 clearInterval(timer);
 const options=document.querySelectorAll(".option");
 options.forEach(option=>{
   option.style.pointerEvents="none";
   if(option.textContent===correctAnswer){
     option.classList.add("correct");
   } else if(option===selected){
     option.classList.add("wrong");
   }
 });

 if(selected.textContent===correctAnswer){
   points+=10;
   scoreEl.textContent="Points: "+points;
   playSound(true);
 } else {
   playSound(false);
 }
}

function showResult(){
 questionEl.textContent="🏆 Quiz Finished!";
 optionsEl.innerHTML="";
 progressEl.style.width="100%";
 nextBtn.textContent="Restart";
 nextBtn.onclick=()=>location.reload();

 if(points>(localStorage.getItem("highscore")||0)){
   localStorage.setItem("highscore",points);
 }

 launchConfetti();
}

function playSound(correct){
 const audio=new Audio(correct?
   "https://www.soundjay.com/buttons/sounds/button-4.mp3":
   "https://www.soundjay.com/buttons/sounds/button-10.mp3");
 audio.play();
}

function launchConfetti(){
 for(let i=0;i<40;i++){
   const confetti=document.createElement("div");
   confetti.classList.add("confetti");
   confetti.style.left=Math.random()*400+"px";
   confetti.style.backgroundColor=
     "hsl("+Math.random()*360+",100%,50%)";
   document.body.appendChild(confetti);
   setTimeout(()=>confetti.remove(),3000);
 }
}
</script>

</body>
</html>
